<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал розрахунків — Мій кабінет</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark custom-nav fixed-top">
        <div class="container">
            <a class="navbar-brand brand-block" href="index.html">
                <img src="images/logo.png" class="brand-logo">
                <span>Теплоенергетик</span>
            </a>
        </div>
    </nav>

    <header class="hero-section">
        <div class="container text-center">
            <h1>Журнал розрахунків</h1>
            <p class="hero-subtitle">Історія ваших розрахунків</p>
        </div>
    </header>

    <main class="container main-content">

        <h2 class="section-title">Історія розрахунків</h2>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Дата</th>
                        <th>Назва формули</th>
                        <th>Змінні</th>
                        <th>Результат</th>
                        <th>Дії</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>2026-03-15</td>
                        <td>Формула 1</td>
                        <td>x, y, z</td>
                        <td>123</td>
                        <td>
                            <button class="btn btn-sm btn-danger">Видалити</button>
                            <button class="btn btn-sm btn-primary">Експорт</button>
                        </td>
                    </tr>
                    <tr>
                        <td>2026-03-14</td>
                        <td>Формула 2</td>
                        <td>a, b</td>
                        <td>456</td>
                        <td>
                            <button class="btn btn-sm btn-danger">Видалити</button>
                            <button class="btn btn-sm btn-primary">Експорт</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="text-center mt-3">
            <button class="btn btn-danger btn-sm">Видалити всі розрахунки</button>
            <button class="btn btn-primary btn-sm">Експорт у CSV</button>
        </div>

    </main>

    <footer class="footer">
        © 2026 КАЛЬКУЛЯТОР ТЕПЛОЕНЕРГЕТИК
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
