<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профіль — Теплоенергетик</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark custom-nav fixed-top">
        <div class="container">
            <a class="navbar-brand brand-block" href="index.html">
                <img src="images/logo.png" class="brand-logo">
                <span>Теплоенергетик</span>
            </a>
        </div>
    </nav>

    <header class="hero-section">
        <div class="container text-center">
            <h1>Профіль користувача</h1>
            <p class="hero-subtitle">Персоналізація вашого облікового запису</p>
        </div>
    </header>

    <main class="container main-content">

        <h2 class="section-title">Інформація профілю</h2>

        <form>
            <div class="mb-3">
                <label class="form-label">Нікнейм</label>
                <input type="text" class="form-control" placeholder="Ваш нікнейм">
            </div>

            <div class="mb-3">
                <label class="form-label">Пошта</label>
                <input type="email" class="form-control" placeholder="email@example.com">
            </div>

            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <input type="password" class="form-control" placeholder="Пароль">
            </div>

            <div class="mb-3">
                <label class="form-label">Іконка профілю</label>
                <select class="form-select">
                    <option>🌡️</option>
                    <option>🔥</option>
                    <option>❄️</option>
                    <option>💧</option>
                    <option>⚡</option>
                </select>
            </div>

            <button type="submit" class="btn btn-main btn-sm">Зберегти зміни</button>
            <button type="button" class="btn btn-danger btn-sm">Видалити профіль</button>
        </form>

    </main>

    <footer class="footer">
        © 2026 КАЛЬКУЛЯТОР ТЕПЛОЕНЕРГЕТИК
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
