<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проєкти — Мій кабінет</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark custom-nav fixed-top">
        <div class="container">
            <a class="navbar-brand brand-block" href="index.html">
                <img src="images/logo.png" class="brand-logo">
                <span>Теплоенергетик</span>
            </a>
        </div>
    </nav>

    <header class="hero-section">
        <div class="container text-center">
            <h1>Проєкти</h1>
            <p class="hero-subtitle">Керування проєктами користувача</p>
        </div>
    </header>

    <main class="container main-content">

        <h2 class="section-title">Список проєктів</h2>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Назва проєкту</th>
                    <th>Іконка</th>
                    <th>Тема</th>
                    <th>Дії</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Проєкт 1</td>
                    <td>🌡️</td>
                    <td>Загальна</td>
                    <td>
                        <button class="btn btn-sm btn-secondary">Редагувати</button>
                        <button class="btn btn-sm btn-danger">Видалити</button>
                        <button class="btn btn-sm btn-primary">Експорт</button>
                    </td>
                </tr>
                <tr>
                    <td>Проєкт 2</td>
                    <td>🔥</td>
                    <td>Теплотехніка</td>
                    <td>
                        <button class="btn btn-sm btn-secondary">Редагувати</button>
                        <button class="btn btn-sm btn-danger">Видалити</button>
                        <button class="btn btn-sm btn-primary">Експорт</button>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="text-center mt-4">
            <button class="btn btn-main btn-sm">Створити новий проєкт</button>
        </div>

    </main>

    <footer class="footer">
        © 2026 КАЛЬКУЛЯТОР ТЕПЛОЕНЕРГЕТИК
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
