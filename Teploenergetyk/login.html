<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід — Теплоенергетик</title>

    <script>
        (function () {
            const theme = localStorage.getItem("theme") || "light";
            const color = localStorage.getItem("color_scheme") || "green";
            const fontSize = localStorage.getItem("font_size") || "normal";

            document.documentElement.setAttribute("data-theme", theme);
            document.documentElement.setAttribute("data-color", color);
            document.documentElement.setAttribute("data-font-size", fontSize);
        })();
    </script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/themes.css">
</head>

<body class="auth-body">

    <main class="auth-page">

        <div class="auth-card">

            <a href="index.html" class="auth-back-link">
                ← Повернутися на головну
            </a>

            <div class="auth-header text-center">
                <img src="assets/images/logo.png" alt="Логотип" class="auth-logo">
                <h1>Вхід у систему</h1>
                <p>
                    Увійдіть у свій акаунт, щоб працювати з історією розрахунків і проєктами.
                </p>
            </div>

            <div id="authMessage" class="alert d-none" role="alert"></div>

            <form id="loginForm" autocomplete="off">

                <div class="mb-3">
                    <label for="loginIdentifier" class="form-label">Email або нікнейм</label>
                    <input type="text"
                           class="form-control"
                           id="loginIdentifier"
                           name="login_identifier"
                           placeholder="example@email.com або nickname"
                           autocomplete="username"
                           required>
                </div>

                <div class="mb-3">
                    <label for="loginPassword" class="form-label">Пароль</label>
                    <input type="password"
                           class="form-control"
                           id="loginPassword"
                           name="login_password"
                           placeholder="Введіть пароль"
                           autocomplete="current-password"
                           required>
                </div>

                <button type="submit" class="btn btn-main w-100">
                    Увійти
                </button>

            </form>

            <div class="auth-switch text-center mt-4">
                <p class="mb-2">Немає акаунта?</p>
                <a href="register.html" class="btn btn-outline-success w-100">
                    Зареєструватися
                </a>
            </div>

        </div>

    </main>

    <footer class="footer">
        © 2026 КАЛЬКУЛЯТОР ТЕПЛОЕНЕРГЕТИК
    </footer>

    <div id="siteModal" class="site-modal d-none">
        <div class="site-modal-backdrop"></div>

        <div class="site-modal-dialog">
            <button type="button" class="site-modal-close" id="siteModalCloseBtn">
                &times;
            </button>

            <h3 class="site-modal-title" id="siteModalTitle">Повідомлення</h3>

            <div class="site-modal-body" id="siteModalBody">
                Текст повідомлення
            </div>

            <div class="site-modal-actions" id="siteModalActions">
                <button type="button" class="btn btn-outline-secondary" id="siteModalCancelBtn">
                    Скасувати
                </button>

                <button type="button" class="btn btn-main" id="siteModalOkBtn">
                    OK
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/supabase-client.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
