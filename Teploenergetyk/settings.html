<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Налаштування — Теплоенергетик</title>

    <script>
        (function () {
            const theme = localStorage.getItem("theme") || "light";
            const color = localStorage.getItem("color_scheme") || "green";
            const fontSize = localStorage.getItem("font_size") || "normal";

            document.documentElement.setAttribute("data-theme", theme);
            document.documentElement.setAttribute("data-color", color);
            document.documentElement.setAttribute("data-font-size", fontSize);
        })();
    </script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/themes.css">
</head>

<body>

    <!-- ================= НАВІГАЦІЯ ================= -->
    <nav class="navbar navbar-expand-lg navbar-dark custom-nav fixed-top">
        <div class="container">

            <a class="navbar-brand brand-block" href="index.html">
                <img src="assets/images/logo.png" alt="Логотип Теплоенергетик" class="brand-logo">
                <span class="brand-text">Теплоенергетик</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto nav-custom">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Головна</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="calculators.html">Калькулятори</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="directory.html">Довідник</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="office.html">Мій кабінет</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="settings.html">Налаштування</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Вхід</a>
                    </li>
                </ul>

            </div>
        </div>
    </nav>

    <!-- ================= ОСНОВНИЙ КОНТЕНТ ================= -->
    <main class="container main-content">

        <div id="settingsMessage" class="alert d-none" role="alert"></div>

        <div class="row g-4">

            <!-- ================= ПРОФІЛЬ ================= -->
            <div class="col-lg-5">
                <div class="card p-4 h-100">
                    <h2 class="section-title">Профіль</h2>

                    <div class="text-center mb-4">
                        <img id="currentAvatar"
                             src="assets/avatars/avatar-engineer.png"
                             alt=""
                             class="settings-avatar">

                        <p class="mt-3 mb-1">
                            <strong id="profileUsername">Користувач</strong>
                        </p>

                        <p class="text-muted mb-0" id="profileEmail">
                            email@example.com
                        </p>
                    </div>

                    <form id="profileForm">
                        <div class="mb-3">
                            <label for="usernameInput" class="form-label">
                                Нікнейм
                            </label>
                            <input type="text"
                                   id="usernameInput"
                                   class="form-control"
                                   minlength="3"
                                   maxlength="30"
                                   required>
                        </div>

                        <button type="submit" class="btn btn-main w-100">
                            Зберегти профіль
                        </button>
                    </form>

                    <hr>

                    <button id="logoutSettingsBtn" class="btn btn-outline-secondary w-100 mb-2" type="button">
                        Вийти з акаунта
                    </button>

                    <button id="deleteAccountBtn" class="btn btn-outline-danger w-100" type="button">
                        Видалити профіль
                    </button>
                </div>
            </div>


            <!-- ================= АВАТАРИ ================= -->
            <div class="col-lg-7">
                <div class="card p-4 h-100">
                    <h2 class="section-title">Вибір аватара</h2>

                    <p class="text-muted">
                        Оберіть одну із заготовлених іконок профілю.
                    </p>

                    <div id="avatarGrid" class="avatar-grid">

                        <button class="avatar-option" type="button" data-avatar="assets/avatars/Avatar-engineer.png">
                            <img src="assets/avatars/Avatar-engineer.png" alt="Інженер">
                        </button>

                        <button class="avatar-option" type="button" data-avatar="assets/avatars/Avatar-energy-engineer.png">
                            <img src="assets/avatars/Avatar-energy-engineer.png" alt="Енергетик">
                        </button>

                        <button class="avatar-option" type="button" data-avatar="assets/avatars/Avatar-mechanic.png">
                            <img src="assets/avatars/Avatar-mechanic.png" alt="Механік">
                        </button>

                        <button class="avatar-option" type="button" data-avatar="assets/avatars/Avatar-scientist.png">
                            <img src="assets/avatars/Avatar-scientist.png" alt="Вчений">
                        </button>

                        <button class="avatar-option" type="button" data-avatar="assets/avatars/Avatar-plumber.png">
                            <img src="assets/avatars/Avatar-plumber.png" alt="Сантехнік">
                        </button>

                        <button class="avatar-option" type="button" data-avatar="assets/avatars/Avatar-gasman.png">
                            <img src="assets/avatars/Avatar-gasman.png" alt="Газовщик">
                        </button>

                        <button class="avatar-option" type="button" data-avatar="assets/avatars/Avatar-designer.png">
                            <img src="assets/avatars/Avatar-designer.png" alt="Конструктор">
                        </button>

                        <button class="avatar-option" type="button" data-avatar="assets/avatars/Avatar-Golets.png">
                            <img src="assets/avatars/Avatar-Golets.png" alt="Студент">
                        </button>

                    </div>
                </div>
            </div>


            <!-- ================= ПЕРСОНАЛІЗАЦІЯ ================= -->
            <div class="col-lg-12">
                <div class="card p-4">
                    <h2 class="section-title">Персоналізація інтерфейсу</h2>

                    <form id="appearanceForm">
                        <div class="row g-3">

                            <div class="col-md-4">
                                <label for="themeSelect" class="form-label">
                                    Тема
                                </label>
                                <select id="themeSelect" class="form-select">
                                    <option value="light">Світла</option>
                                    <option value="dark">Темна</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label for="colorSchemeSelect" class="form-label">
                                    Кольорова гама
                                </label>
                                <select id="colorSchemeSelect" class="form-select">
                                    <option value="green">Зелена</option>
                                    <option value="blue">Синя</option>
                                    <option value="red">Червона</option>
                                    <option value="gray">Сіра</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label for="fontSizeSelect" class="form-label">
                                    Розмір шрифту
                                </label>
                                <select id="fontSizeSelect" class="form-select">
                                    <option value="small">Малий</option>
                                    <option value="normal">Звичайний</option>
                                    <option value="large">Великий</option>
                                </select>
                            </div>

                        </div>

                        <button type="submit" class="btn btn-main mt-4">
                            Зберегти налаштування
                        </button>
                    </form>
                </div>
            </div>

        </div>

    </main>


    <!-- ================= ФУТЕР ================= -->
    <footer class="footer">
        © 2026 КАЛЬКУЛЯТОР ТЕПЛОЕНЕРГЕТИК
    </footer>

    <div id="siteModal" class="site-modal d-none">
        <div class="site-modal-backdrop"></div>

        <div class="site-modal-dialog">
            <button type="button" class="site-modal-close" id="siteModalCloseBtn">
                &times;
            </button>

            <h3 class="site-modal-title" id="siteModalTitle">Повідомлення</h3>

            <div class="site-modal-body" id="siteModalBody">
                Текст повідомлення
            </div>

            <div class="site-modal-actions" id="siteModalActions">
                <button type="button" class="btn btn-outline-secondary" id="siteModalCancelBtn">
                    Скасувати
                </button>

                <button type="button" class="btn btn-main" id="siteModalOkBtn">
                    OK
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/supabase-client.js"></script>
    <script src="js/app.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
